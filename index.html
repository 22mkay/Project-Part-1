<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>DraFT.sneakers</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="logo">DraFT.<span>sneakers</span></div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="#">Shop</a></li>
        <li><a href="#">Collections</a></li>
        <li><a href="Contact.html">Contact</a></li>
      </ul>
    </nav>

  <section class="hero">
    <h1>Step Into Style</h1>

        <p>$95</p>

      </div>
      <div class="product-card">
        <img src="images/sneaker3.jpg" alt="Sneaker 3">

  <footer>
    <p>&copy; 2026 DraFT.sneakers & mikzin. All rights reserved.</p>
